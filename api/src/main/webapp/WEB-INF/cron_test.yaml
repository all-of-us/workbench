cron:
- url: /v1/cron/checkObjectNameSize
  schedule: every 24 hours
- url: /v1/cron/checkInitialCreditsUsage
  schedule: every 24 hours
- url: /v1/cron/archiveNextLegacyWorkspace
  schedule: every 0.5 minutes
  timezone: America/Chicago
  target: api
  retry_parameters:
    job_retry_limit: 3
    min_backoff_seconds: 5
